<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Discover your external IP address with geolocation information"
    />
    <meta name="theme-color" content="#1a1a2e" />
    <title>What's My IP Address?</title>
    <link rel="stylesheet" href="/flag-icons/css/flag-icons.min.css" />
    <link rel="preload" href="/api/ip" as="fetch" crossorigin />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="flag-bg" class="flag-bg" aria-hidden="true"></div>
    <button
      id="theme-toggle"
      class="btn-theme-toggle"
      aria-label="Toggle dark mode"
      title="Toggle dark/light mode"
    >
      <svg
        class="icon-sun"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        aria-hidden="true"
      >
        <circle cx="12" cy="12" r="5" />
        <line x1="12" y1="1" x2="12" y2="3" />
        <line x1="12" y1="21" x2="12" y2="23" />
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
        <line x1="1" y1="12" x2="3" y2="12" />
        <line x1="21" y1="12" x2="23" y2="12" />
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
      </svg>
      <svg
        class="icon-moon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        aria-hidden="true"
      >
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
    </button>
    <div class="container">
      <main class="content">
        <!-- Loading State -->
        <div
          id="loading"
          class="loading"
          aria-live="polite"
          aria-label="Detecting your IP address"
        >
          <div class="skeleton-ip-display">
            <div class="skeleton skeleton-label"></div>
            <div class="skeleton skeleton-ip"></div>
          </div>
          <div class="skeleton skeleton-location"></div>
        </div>

        <!-- Error State -->
        <div id="error" class="error hidden" role="alert">
          <svg
            class="icon-error"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <p id="error-message">Unable to detect your IP address</p>
          <button id="retry-btn" class="btn-retry">Try Again</button>
        </div>

        <!-- Main Content -->
        <div id="main-content" class="main-content hidden">
          <h1 class="sr-only">Your IP Address Information</h1>

          <!-- IP Address Display -->
          <div class="ip-display">
            <label for="ip-address" class="ip-label">Your IP Address</label>
            <div class="ip-wrapper">
              <span
                id="ip-address"
                class="ip-address copyable"
                role="button"
                tabindex="0"
                aria-label="Your IP address — click to copy"
                title="Click to copy"
                >--.--.--.--</span
              >
              <span
                id="ip-live"
                class="sr-only"
                aria-live="polite"
                aria-atomic="true"
              ></span>

              <div id="asn-display" class="asn-display hidden">
                <span class="asn-row">
                  <span
                    id="asn-value"
                    class="asn-value copyable"
                    role="button"
                    tabindex="0"
                    aria-label="ASN number — click to copy"
                    title="Click to copy"
                    >--</span
                  >
                  <span id="asn-name" class="asn-name"></span>
                </span>
                <span id="cidr-row" class="cidr-row hidden">
                  <span class="cidr-label">Range</span>
                  <span
                    id="cidr-value"
                    class="cidr-value copyable"
                    role="button"
                    tabindex="0"
                    aria-label="CIDR range — click to copy"
                    title="Click to copy"
                  ></span>
                </span>
              </div>

              <div id="location-row" class="location-row hidden">
                <span
                  id="location-flag"
                  class="location-flag"
                  aria-hidden="true"
                ></span>
                <span id="location" class="location-value"></span>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- Footer -->
      <footer class="footer">
        <div class="credits">
          <p>
            Whatmyip uses the
            <a
              href="https://lite.ip2location.com/database-asn"
              target="_blank"
              rel="noopener noreferrer"
              >ASN LITE</a
            >
            and
            <a
              href="https://lite.ip2location.com/ip2location-lite"
              target="_blank"
              rel="noopener noreferrer"
              >IP2Location LITE</a
            >
            database for
            <a
              href="https://www.ip2location.com"
              target="_blank"
              rel="noopener noreferrer"
              >IP geolocation</a
            >.
          </p>
        </div>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
