services:
  whatsmyip:
    container_name: whatsmyip
    image: code.paulg.it/paulgit/whatsmyip
    ports:
      - "3000:3000"

    environment:
      NODE_ENV: production
      PORT: 3000
      # Provide via host environment or CI/CD secrets:
      #   export IPINFO_TOKEN=...
      IPINFO_TOKEN: ${IPINFO_TOKEN:-}

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
