services:
  whatsmyip:
    container_name: whatsmyip
    build:
      context: .
      args:
        MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}
        MAXMIND_ACCOUNT_ID: ${MAXMIND_ACCOUNT_ID:-}
    image: code.paulg.it/paulgit/whatsmyip
    ports:
      - "3000:3000"

    environment:
      NODE_ENV: production
      PORT: 3000
      # MaxMind GeoLite2 credentials (used only at build time for Docker;
      # for local dev, run: npm run download-geodata)
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}
      MAXMIND_ACCOUNT_ID: ${MAXMIND_ACCOUNT_ID:-}

    restart: unless-stopped
