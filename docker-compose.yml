services:
  whatsmyip:
    container_name: whatsmyip
    build:
      context: .
      args:
        IP2LOCATION_TOKEN: ${IP2LOCATION_TOKEN:-}
    image: code.paulg.it/paulgit/whatsmyip
    ports:
      - "3000:3000"

    environment:
      NODE_ENV: production
      PORT: 3000
      # IP2Location LITE token (used only at build time for Docker;
      # for local dev, run: npm run download-geodata)
      IP2LOCATION_TOKEN: ${IP2LOCATION_TOKEN:-}
      DEV_IP: "8.8.8.8"

    restart: unless-stopped
