services:
  whatsmyip:
    container_name: whatsmyip
    image: code.paulg.it/paulgit/whatsmyip
    ports:
      - "3000:3000"

    environment:
      NODE_ENV: production
      PORT: 3000
      # Provide via host environment or CI/CD secrets:
      #   export IPINFO_TOKEN=...
      IPINFO_TOKEN: ${IPINFO_TOKEN:-}

    restart: unless-stopped
